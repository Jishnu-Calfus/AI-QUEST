<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Guardian — Task Trace</title>
<style>
  :root { --bg:#0b0e14; --card:#141926; --line:#232b3d; --txt:#e6e9f0; --dim:#8b94a7;
          --ok:#2dd4a7; --warn:#f5b23e; --bad:#f4587a; --info:#5aa7ff; --purple:#b58aff; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--txt); font:14px/1.45 ui-sans-serif,system-ui,'Segoe UI',Roboto,sans-serif; padding:20px; }
  a { color:var(--info); text-decoration:none; } a:hover { text-decoration:underline; }
  .top { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  h1 { font-size:20px; letter-spacing:.3px; } h1 .shield { color:var(--ok); }
  .mono { font:12px ui-monospace,Menlo,monospace; }
  .sub { color:var(--dim); font-size:12px; margin:3px 0 16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; margin-bottom:14px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:1.2px; color:var(--dim); margin-bottom:10px; }
  .grid { display:grid; grid-template-columns: 1.4fr .85fr; gap:14px; align-items:start; }
  @media (max-width:1050px){ .grid{ grid-template-columns:1fr; } }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.8px; padding:4px 8px; }
  td { padding:6px 8px; border-top:1px solid var(--line); font-size:13px; vertical-align:top; }
  .pill { display:inline-block; padding:1px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .running{background:#12351f;color:var(--ok)} .warned{background:#3a2d10;color:var(--warn)}
  .paused{background:#3a2d10;color:var(--warn)} .escalated{background:#3d1420;color:var(--bad)}
  .killed{background:#3d1420;color:var(--bad)} .finished{background:#1c2333;color:var(--dim)}
  .unknown{background:#1c2333;color:var(--dim)}
  #kpis { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
  .kpi { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 16px; flex:1; min-width:120px; }
  .kpi .v { font-size:21px; font-weight:700; } .kpi .l { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
  .cost { color:var(--warn); }
  .viol { border:1px solid var(--line); border-left:4px solid var(--bad); border-radius:0 10px 10px 0; background:#1a1220; padding:12px 14px; margin-bottom:10px; }
  .viol h3 { font-size:14px; } .viol p { color:#cdd3e0; font-size:12.5px; margin-top:4px; }
  .viol .ev { color:var(--dim); font:11px ui-monospace,monospace; margin-top:4px; }
  .tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
  .tag.kill,.tag.escalate{color:var(--bad)} .tag.pause,.tag.warn{color:var(--warn)}
  .btn { background:transparent; border:1px solid var(--line); color:var(--txt); border-radius:6px; padding:4px 12px; font-size:12px; cursor:pointer; }
  .btn:hover{ border-color:var(--info); } .btn.kill:hover{ border-color:var(--bad); color:var(--bad); }
  .graphwrap { overflow-x:auto; border:1px solid var(--line); border-radius:8px; background:#0d1220; }
  .glegend { font-size:11px; color:var(--dim); margin-top:8px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .bar { height:9px; background:var(--line); border-radius:4px; overflow:hidden; margin:6px 0; display:flex; }
  .bar i { display:block; height:100%; }
  .live { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--dim); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--ok); }
  .dot.pulse { animation:pulse 1s ease-out; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(45,212,167,.6)} 100%{box-shadow:0 0 0 8px rgba(45,212,167,0)} }
  .muted { color:var(--dim); } .clchip{ display:inline-block;padding:0 7px;border-radius:5px;font-size:10.5px;font-weight:600 }
</style>
</head>
<body>
<div class="top">
  <a href="/" title="back to fleet dashboard">← fleet</a>
  <h1><span class="shield">⬡</span> task <span id="task-name" class="mono">…</span></h1>
  <span id="state" class="pill unknown">…</span>
  <span id="controls"></span>
  <span class="live" style="margin-left:auto"><span id="dot" class="dot"></span><span id="upd">connecting…</span></span>
</div>
<div class="sub" id="meta">realized workflow · one end-to-end request stitched from the event stream</div>

<div id="kpis"></div>
<div id="viols"></div>

<div class="grid">
  <div>
    <div class="card">
      <h2>Realized call graph <span class="muted" style="text-transform:none;letter-spacing:0">— runs colored by cluster · parent→child invocations · denied edges in red</span></h2>
      <div class="graphwrap"><div id="graph" style="padding:6px"></div></div>
      <div class="glegend" id="glegend"></div>
    </div>
    <div class="card"><h2>Runs in this task (spans)</h2><div id="runs"></div></div>
  </div>
  <div>
    <div class="card"><h2>Cost by cluster — the CFO answer</h2><div id="cost"></div></div>
    <div class="card"><h2>Declared vs realized</h2><div id="declared"></div></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => (s==null?'':s.toString()).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const taskId = new URLSearchParams(location.search).get('task_id') || '';
const CLC = {ingestion:'#5aa7ff', extraction:'#2dd4a7', validation:'#b58aff',
  payments:'#f4587a', reporting:'#f5b23e', '(unassigned)':'#8b94a7'};
const cColor = c => CLC[c] || '#7c8bb0';
const fmtCost = v => '$'+(v||0).toFixed(v>=1?2:4);
document.title = 'Guardian — task ' + taskId;

async function load(){
  let d;
  try { d = await (await fetch(`/v1/tasks/${encodeURIComponent(taskId)}`)).json(); }
  catch(e){ $('upd').textContent='fetch error'; return; }
  if(d.detail){ $('meta').textContent = 'unknown task'; return; }
  render(d);
  $('upd').textContent = 'updated ' + new Date().toLocaleTimeString();
}

function render(d){
  $('task-name').textContent = d.task_id;
  const st = $('state'); st.className='pill '+(d.state||'unknown'); st.textContent=d.state||'unknown';
  $('meta').innerHTML = `swarm <span class="mono">${esc(d.swarm_id)}</span>`
    + (d.goal?` · goal <span class="muted">“${esc(d.goal)}”</span>`:'');
  renderControls(d);
  renderKPIs(d);
  renderViols(d);
  renderGraph(d);
  renderRuns(d.nodes||[]);
  renderCost(d);
  renderDeclared(d);
}

function renderControls(d){
  if(d.state==='escalated' || d.state==='paused')
    $('controls').innerHTML = `<button class="btn" onclick="act('resume')">resume task</button> <button class="btn kill" onclick="act('kill')">kill task</button>`;
  else if(d.state==='running')
    $('controls').innerHTML = `<button class="btn" onclick="act('pause')">pause task</button> <button class="btn kill" onclick="act('kill')">kill task</button>`;
  else $('controls').innerHTML='';
}
async function act(a){ await fetch(`/v1/tasks/${encodeURIComponent(taskId)}/action`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:a,who:'task-view'})}); setTimeout(load,150); }

function renderKPIs(d){
  const vc = d.violation_count||0;
  $('kpis').innerHTML = `
    <div class="kpi"><div class="v cost">${fmtCost(d.cost_usd)}</div><div class="l">task cost</div></div>
    <div class="kpi"><div class="v">${d.run_count||0}</div><div class="l">runs (spans)</div></div>
    <div class="kpi"><div class="v">${d.cluster_count||0}</div><div class="l">clusters touched</div></div>
    <div class="kpi"><div class="v" style="color:${vc?'var(--bad)':'var(--txt)'}">${vc}</div><div class="l">topology violations</div></div>`;
}

function renderViols(d){
  const v = d.violations||[];
  if(!v.length){ $('viols').innerHTML=''; return; }
  $('viols').innerHTML = v.map(x=>{
    const ev = Object.entries(x.evidence||{}).map(([k,val])=>`${k}=${esc(String(val)).slice(0,50)}`).join(' · ');
    return `<div class="viol">
      <h3><span class="tag ${x.action}">${esc(x.action)}</span> ${esc(x.title)}
        <span class="muted mono" style="font-weight:400;font-size:11px">· run ${esc((x.run_id||'').slice(0,8))} (${esc(x.agent_id)})</span></h3>
      <p>${esc(x.reason)}</p>${ev?`<div class="ev">${ev}</div>`:''}</div>`;
  }).join('')
   + `<div class="muted" style="font-size:12px;margin:2px 0 12px">
        The offending run is frozen at its checkpoint — the denied action never executed.
        <b>A human decides:</b> use <b>resume/kill task</b> above; the click lands in the audit log.</div>`;
}

function renderCost(d){
  const cb = d.cost_by_cluster||{}, total = d.cost_usd||0;
  const ents = Object.entries(cb).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!ents.length){ $('cost').innerHTML='<p class="muted">no cost yet</p>'; return; }
  const segs = ents.map(([c,v])=>`<i title="${c}: ${fmtCost(v)}" style="width:${Math.max(2,v/(total||1)*100)}%;background:${cColor(c)}"></i>`).join('');
  const rows = ents.map(([c,v])=>`<tr>
    <td><span class="clchip" style="background:#182034;color:${cColor(c)}">${esc(c)}</span></td>
    <td class="mono cost">${fmtCost(v)}</td><td class="muted mono">${(v/(total||1)*100).toFixed(0)}%</td></tr>`).join('');
  $('cost').innerHTML = `<div class="mono cost" style="font-size:16px">${fmtCost(total)}</div>
    <div class="bar">${segs}</div><table>${rows}</table>`;
}

function renderDeclared(d){
  const declared = d.declared_clusters||[], realized = new Set(d.clusters||[]), untouched = new Set(d.untouched_clusters||[]);
  if(!declared.length){ $('declared').innerHTML='<p class="muted">swarm declares no clusters</p>'; return; }
  $('declared').innerHTML = declared.map(c=>{
    const on = realized.has(c);
    return `<div style="padding:4px 0"><span class="clchip" style="background:#182034;color:${on?cColor(c):'#555c6e'}">${esc(c)}</span>
      <span class="muted" style="font-size:12px">${on?'realized in this task':'declared but not touched'}</span></div>`;
  }).join('') + (untouched.size?`<p class="muted" style="font-size:11px;margin-top:6px">grey = org-chart clusters this task never used (drift signal)</p>`:'');
}

function renderRuns(nodes){
  if(!nodes.length){ $('runs').innerHTML='<p class="muted">no runs yet</p>'; return; }
  $('runs').innerHTML = `<table><thead><tr><th>agent</th><th>cluster</th><th>state</th><th>cost</th></tr></thead><tbody>`
    + nodes.map(n=>`<tr>
      <td class="mono"><a class="alink" href="/agent?agent_id=${encodeURIComponent(n.agent_id)}">${esc(n.agent_id)}</a></td>
      <td><span class="clchip" style="background:#182034;color:${cColor(n.cluster)}">${esc(n.cluster)}</span></td>
      <td><span class="pill ${n.state}">${n.state}</span></td>
      <td class="mono cost">${fmtCost(n.cost_usd)}</td></tr>`).join('')
    + `</tbody></table>`;
}

// ---- realized DAG: layered left->right by invocation depth ----
function renderGraph(d){
  const nodes = d.nodes||[], edges = d.edges||[];
  const g = $('graph'), legend = $('glegend');
  if(!nodes.length){ g.innerHTML='<p class="muted" style="padding:14px">no runs yet</p>'; legend.innerHTML=''; return; }
  const byId = {}; nodes.forEach(n=>byId[n.run_id]=n);
  // depth = distance from a root (node whose parent isn't in this task)
  const depth = {};
  const dOf = (id, seen) => {
    if(depth[id]!=null) return depth[id];
    const n = byId[id]; if(!n){ return 0; }
    const p = n.parent_run_id;
    if(!p || !byId[p] || (seen&&seen.has(id))) return depth[id]=0;
    const s = seen||new Set(); s.add(id);
    return depth[id] = 1 + dOf(p, s);
  };
  nodes.forEach(n=>dOf(n.run_id));
  const cols = {}; nodes.forEach(n=>{ (cols[depth[n.run_id]]=cols[depth[n.run_id]]||[]).push(n); });
  const NW=170, NH=54, GX=70, GY=22, MX=26, MY=22;
  const maxRows = Math.max(...Object.values(cols).map(c=>c.length));
  const ncols = Object.keys(cols).length;
  const pos = {};
  Object.keys(cols).map(Number).sort((a,b)=>a-b).forEach(dp=>{
    cols[dp].forEach((n,i)=>{ pos[n.run_id] = {x: MX+dp*(NW+GX), y: MY+i*(NH+GY)}; });
  });
  const W = MX*2 + ncols*NW + Math.max(0,ncols-1)*GX;
  const H = MY*2 + maxRows*NH + Math.max(0,maxRows-1)*GY;

  const defs = `<defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4d5b7a"/></marker>
    <marker id="arL" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f4587a"/></marker>
  </defs>`;

  let ep = '';
  edges.forEach(e=>{
    const a=pos[e.from], b=pos[e.to]; if(!a||!b) return;
    const x1=a.x+NW, y1=a.y+NH/2, x2=b.x, y2=b.y+NH/2;
    const col = e.denied ? '#f4587a' : '#4d5b7a', mk = e.denied?'arL':'ar', wdt = e.denied?3:1.6;
    const mx=(x1+x2)/2;
    ep += `<path d="M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${wdt}" marker-end="url(#${mk})"/>`;
    if(e.denied){
      ep += `<rect x="${mx-30}" y="${(y1+y2)/2-9}" width="60" height="16" rx="4" fill="#0d1220" stroke="#f4587a"/>`
          + `<text x="${mx}" y="${(y1+y2)/2+3}" text-anchor="middle" font-size="10" fill="#f4587a" font-family="ui-monospace,monospace">⛔ DENIED</text>`;
    }
  });

  let np = '';
  nodes.forEach(n=>{
    const p=pos[n.run_id], col=cColor(n.cluster);
    const frozen = (n.state==='escalated'||n.state==='paused');
    const strokeC = frozen ? '#f4587a' : col, strokeW = frozen ? 2.4 : 1.5;
    const label = n.agent_id.length>19 ? n.agent_id.slice(0,18)+'…' : n.agent_id;
    np += `<g>
      <rect x="${p.x}" y="${p.y}" width="${NW}" height="${NH}" rx="9" fill="#141926" stroke="${strokeC}" stroke-width="${strokeW}"/>
      <rect x="${p.x}" y="${p.y}" width="5" height="${NH}" rx="2" fill="${col}"/>
      <text x="${p.x+16}" y="${p.y+21}" font-size="12.5" fill="#e6e9f0" font-family="ui-monospace,monospace">${esc(label)}</text>
      <text x="${p.x+16}" y="${p.y+39}" font-size="10.5" fill="${col}" font-family="ui-monospace,monospace">${esc(n.cluster)} · ${fmtCost(n.cost_usd)}</text>
      ${frozen?`<text x="${p.x+NW-10}" y="${p.y+20}" text-anchor="end" font-size="12">🧊</text>`:''}
    </g>`;
  });

  g.innerHTML = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="max-width:none">${defs}${ep}${np}</svg>`;
  const seen = [...new Set(nodes.map(n=>n.cluster))];
  legend.innerHTML = seen.map(c=>`<span><b style="color:${cColor(c)}">■</b> ${esc(c)}</span>`).join('')
    + `<span><b style="color:#f4587a">▬ ⛔</b> denied cluster edge</span>`
    + `<span>🧊 frozen run (awaiting human)</span>`
    + `<span class="muted">left→right = invocation order</span>`;
}

// ---- realtime: SSE + poll ----
let reloadTimer=null;
function scheduleReload(){ if(reloadTimer) return; reloadTimer=setTimeout(()=>{reloadTimer=null; load();}, 400); }
function pulse(){ const d=$('dot'); d.classList.remove('pulse'); void d.offsetWidth; d.classList.add('pulse'); }
function connectSSE(){
  const es = new EventSource('/v1/stream');
  es.onopen = ()=>{ $('upd').textContent='live'; };
  es.onmessage = m=>{
    let msg; try{ msg=JSON.parse(m.data); }catch(e){ return; }
    const d = msg.data||{};
    if(d.task_id===taskId){ pulse(); scheduleReload(); }
  };
  es.onerror = ()=>{ $('upd').textContent='reconnecting…'; };
}
load(); connectSSE(); setInterval(load, 3000);
</script>
</body>
</html>
